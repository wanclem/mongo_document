[package]
name = "mongo_document_db_driver_rust"
version = "0.1.0"
edition = "2021"
publish = false

[lib]
name = "mongo_document_db_driver_rust"
crate-type = ["cdylib"]

[dependencies]
mongodb = { version = "3.5.0", features = ["sync", "zstd-compression"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
