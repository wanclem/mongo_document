name: Build mongo_document_db_mongoc natives

on:
  workflow_dispatch:
    inputs:
      publish_to_pub:
        description: "Publish packages/mongo_document_db_mongoc to pub.dev (requires a secret token)"
        type: boolean
        required: false
        default: false
  push:
    paths:
      - packages/mongo_document_db_mongoc/**
      - .github/workflows/build-mongo_document_db_mongoc-native.yml
  pull_request:
    paths:
      - packages/mongo_document_db_mongoc/**
      - .github/workflows/build-mongo_document_db_mongoc-native.yml

jobs:
  build:
    name: ${{ matrix.abi }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            abi: linux_x64
          - os: macos-13
            abi: macos_x64
          - os: macos-latest
            abi: macos_arm64
          - os: windows-latest
            abi: windows_x64

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake pkg-config libmongoc-dev

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install cmake pkg-config mongo-c-driver

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot -or $vcpkgRoot -eq "") { $vcpkgRoot = "C:\\vcpkg" }
          & "$vcpkgRoot\\vcpkg.exe" install mongo-c-driver:x64-windows

      - name: Pub get
        working-directory: packages/mongo_document_db_mongoc
        run: dart pub get

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: packages/mongo_document_db_mongoc
        run: bash tool/build_native.sh

      - name: Bundle deps (Linux)
        if: runner.os == 'Linux'
        working-directory: packages/mongo_document_db_mongoc
        run: |
          out_dir="lib/src/native/${{ matrix.abi }}"
          so_path="$out_dir/libmongo_document_db_mongoc.so"
          ldd "$so_path" | awk '/libmongoc-1\\.0|libbson-1\\.0/ {print $3}' | while read -r dep; do
            cp -L "$dep" "$out_dir/"
          done

      - name: Bundle deps (macOS)
        if: runner.os == 'macOS'
        working-directory: packages/mongo_document_db_mongoc
        run: |
          out_dir="lib/src/native/${{ matrix.abi }}"
          prefix="$(brew --prefix mongo-c-driver)"
          cp -L "$prefix"/lib/libmongoc-1.0*.dylib "$out_dir/" || true
          cp -L "$prefix"/lib/libbson-1.0*.dylib "$out_dir/" || true

      - name: Build (Windows)
        if: runner.os == 'Windows'
        working-directory: packages/mongo_document_db_mongoc
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot -or $vcpkgRoot -eq "") { $vcpkgRoot = "C:\\vcpkg" }
          $toolchain = "$vcpkgRoot\\scripts\\buildsystems\\vcpkg.cmake"

          cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$toolchain"
          cmake --build native/build --config Release

          $outDir = "lib/src/native/windows_x64"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null
          Copy-Item native/build/Release/mongo_document_db_mongoc.dll $outDir/

          $runtimeDir = "$vcpkgRoot\\installed\\x64-windows\\bin"
          if (Test-Path $runtimeDir) {
            Copy-Item "$runtimeDir\\*.dll" $outDir/ -Force
          }

      - name: Test
        working-directory: packages/mongo_document_db_mongoc
        run: dart test

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongo_document_db_mongoc-${{ matrix.abi }}
          path: packages/mongo_document_db_mongoc/lib/src/native/${{ matrix.abi }}/*
          if-no-files-found: error

  linux_arm64:
    name: linux_arm64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - name: Build in Docker (linux/arm64)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "${PWD}:/repo" \
            -w /repo \
            ubuntu:22.04 bash -lc '
              set -euo pipefail
              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential cmake pkg-config libmongoc-dev

              cmake -S packages/mongo_document_db_mongoc/native \
                -B packages/mongo_document_db_mongoc/native/build-arm64 \
                -DCMAKE_BUILD_TYPE=Release
              cmake --build packages/mongo_document_db_mongoc/native/build-arm64 --config Release

              out_dir="packages/mongo_document_db_mongoc/lib/src/native/linux_arm64"
              mkdir -p "$out_dir"
              cp packages/mongo_document_db_mongoc/native/build-arm64/libmongo_document_db_mongoc.so "$out_dir/"

              ldd "$out_dir/libmongo_document_db_mongoc.so" | awk "/libmongoc-1\\.0|libbson-1\\.0/ {print \\$3}" | while read -r dep; do
                cp -L "$dep" "$out_dir/"
              done
            '

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mongo_document_db_mongoc-linux_arm64
          path: packages/mongo_document_db_mongoc/lib/src/native/linux_arm64/*
          if-no-files-found: error

  assemble:
    name: assemble (for publish)
    if: github.event_name == 'workflow_dispatch'
    needs:
      - build
      - linux_arm64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: mongo_document_db_mongoc-*
          path: packages/mongo_document_db_mongoc/lib/src/native

      - name: Normalize layout
        run: |
          set -euo pipefail
          cd packages/mongo_document_db_mongoc/lib/src/native

          # download-artifact nests each artifact under its name; move files into <abi>/.
          for d in mongo_document_db_mongoc-*; do
            abi="${d#mongo_document_db_mongoc-}"
            mkdir -p "${abi}"
            find "${d}" -maxdepth 1 -type f -exec mv {} "${abi}/" \;
            rmdir "${d}" || true
          done

      - name: Verify bundle
        run: |
          set -euo pipefail
          base="packages/mongo_document_db_mongoc/lib/src/native"

          test -f "$base/linux_x64/libmongo_document_db_mongoc.so"
          test -f "$base/linux_arm64/libmongo_document_db_mongoc.so"
          test -f "$base/macos_x64/libmongo_document_db_mongoc.dylib"
          test -f "$base/macos_arm64/libmongo_document_db_mongoc.dylib"
          test -f "$base/windows_x64/mongo_document_db_mongoc.dll"

      - name: Pub get
        working-directory: packages/mongo_document_db_mongoc
        run: dart pub get

      - name: Publish dry-run
        working-directory: packages/mongo_document_db_mongoc
        run: dart pub publish --dry-run

      - name: Upload native bundle
        uses: actions/upload-artifact@v4
        with:
          name: mongo_document_db_mongoc-native-bundle
          path: packages/mongo_document_db_mongoc/lib/src/native
          if-no-files-found: error

      - name: Publish to pub.dev
        if: inputs.publish_to_pub == true
        working-directory: packages/mongo_document_db_mongoc
        env:
          PUB_DEV_TOKEN: ${{ secrets.PUB_DEV_TOKEN }}
        run: |
          if [[ -z "${PUB_DEV_TOKEN:-}" ]]; then
            echo "Missing secret: PUB_DEV_TOKEN" >&2
            exit 1
          fi
          echo "${PUB_DEV_TOKEN}" | dart pub token add https://pub.dev
          dart pub publish --force
